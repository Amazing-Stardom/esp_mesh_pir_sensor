; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; Common settings applied to all boards
[env]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_flags = -D PIO_FRAMEWORK_ARDUINO_LWIP2_IPV6_LOW_MEMORY
monitor_speed = 115200
upload_speed = 460800

lib_deps =
  https://github.com/kakopappa/arduino-esp8266-aes-lib.git
  https://github.com/leodesigner/espNowFloodingMeshLibrary2
  https://github.com/leodesigner/SimpleMqttLibrary
  https://github.com/leodesigner/SimpleTimer2


; --- ENVIRONMENT 1: THE GATEWAY MASTER ---
[env:gateway]
; This tells PlatformIO to ONLY compile the gateway code
build_src_filter = +<gateway.cpp>


; --- ENVIRONMENT 2: THE SENSOR SLAVE ---
[env:slave]
; This tells PlatformIO to ONLY compile the slave code
build_src_filter = +<slave.cpp>